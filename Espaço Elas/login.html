<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="assets/Logo_Espaço_Elas.jpg">
    <title>Faça Login</title>
</head>
<body class="body-login_cadastro">
    <main class="main-login">
            <div class="card-left">  
                <section class="form-a title">
                    <p>Não possui conta? Então</p>
                    <h1><a href="./cadastro.html">Cadastre-se</a></h1>
                </section>
            </div>

            <div class="card-right">
                <section class="form-b">
                    <div class="label-email">
                        <label>USUÁRIO</label>
                        <input type="email" class="subtitulo" name="email" placeholder="Digite seu Email" name="Email" required/>
                    </div>
                    <div class="label-senha">
                        <label>SENHA</label>
                        <input type="password" class="subtitulo" name= placeholder="Digite sua Senha" name="Senha" required/>
                    </div>
                
                    <p id="forgot-password">Esqueceu sua senha?&nbsp;<a href="#">Clique aqui!</a></p>
                    
                    <section class="form-b btn">
                        <button type="submit">ENTRAR</button>
                        <img class="img-google" src="./assets/cadastro_e_login/login_google.png" alt="google">
                    </section>
                </section>
            </div>

            <img class="img-setinha" src="./assets/cadastro_e_login/setinha_direita.jpg" alt="setinha_centro">
    </main> <!-- main-login -->    
</body>
</html>
